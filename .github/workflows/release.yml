name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  STATIME_REPOSITORY: https://github.com/teodly/statime.git
  STATIME_REF: inferno-dev

jobs:
  build-and-release:
    name: Release ${{ matrix.artifact_name }} (${{ matrix.archive_suffix }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: spin2dante
            source_dir: .
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-amd64
            apt_packages: libasound2-dev
            build_command: cargo build --release --target x86_64-unknown-linux-gnu
            package_path: target/x86_64-unknown-linux-gnu/release/spin2dante
          - artifact_name: statime
            source_dir: statime-src
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-amd64
            apt_packages: ""
            build_command: cargo build --release --target x86_64-unknown-linux-gnu -p statime-linux
            package_path: target/x86_64-unknown-linux-gnu/release/statime

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out Statime source
        if: matrix.artifact_name == 'statime'
        run: |
          git clone --depth 1 --recurse-submodules --shallow-submodules             --branch "$STATIME_REF"             "$STATIME_REPOSITORY"             statime-src

      - name: Install system dependencies
        if: matrix.apt_packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build data
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.artifact_name }}-${{ matrix.target }}
          workspaces: |
            ${{ matrix.source_dir }} -> target

      - name: Build release binary
        working-directory: ${{ matrix.source_dir }}
        run: ${{ matrix.build_command }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "${{ matrix.source_dir }}/${{ matrix.package_path }}" "dist/${{ matrix.artifact_name }}"
          tar -C dist -czf "${{ matrix.artifact_name }}-${{ matrix.archive_suffix }}.tar.gz" "${{ matrix.artifact_name }}"
          sha256sum "${{ matrix.artifact_name }}-${{ matrix.archive_suffix }}.tar.gz" > "${{ matrix.artifact_name }}-${{ matrix.archive_suffix }}.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}-${{ matrix.archive_suffix }}.tar.gz
            ${{ matrix.artifact_name }}-${{ matrix.archive_suffix }}.sha256
          generate_release_notes: true
