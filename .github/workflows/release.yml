name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: spin2dante
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Release ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-amd64
            apt_packages: libasound2-dev
            linker: ""
          - name: linux-arm64
            target: aarch64-unknown-linux-gnu
            archive_suffix: linux-arm64
            apt_packages: gcc-aarch64-linux-gnu libc6-dev-arm64-cross libasound2-dev:arm64
            linker: aarch64-linux-gnu-gcc

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable arm64 apt packages
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo python3 - <<'PY'
          from pathlib import Path
          path = Path("/etc/apt/sources.list.d/ubuntu.sources")
          text = path.read_text()
          blocks = []
          for block in text.strip().split("\n\n"):
              if "Architectures:" not in block:
                  block = f"{block}\nArchitectures: amd64"
              blocks.append(block)
          path.write_text("\n\n".join(blocks) + "\n")
          PY
          sudo tee /etc/apt/sources.list.d/ubuntu-arm64.sources >/dev/null <<'EOF'
          Types: deb
          URIs: http://ports.ubuntu.com/ubuntu-ports
          Suites: noble noble-updates noble-backports noble-security
          Components: main restricted universe multiverse
          Architectures: arm64
          Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg
          EOF
          sudo apt-get update

      - name: Install system dependencies
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install cross-compilation dependencies
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo build data
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker }}
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig
          PKG_CONFIG_LIBDIR_aarch64_unknown_linux_gnu: /usr/lib/aarch64-linux-gnu/pkgconfig:/usr/share/pkgconfig
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${BINARY_NAME}" "dist/${BINARY_NAME}"
          tar -C dist -czf "${BINARY_NAME}-${{ matrix.archive_suffix }}.tar.gz" "${BINARY_NAME}"
          sha256sum "${BINARY_NAME}-${{ matrix.archive_suffix }}.tar.gz" > "${BINARY_NAME}-${{ matrix.archive_suffix }}.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.BINARY_NAME }}-${{ matrix.archive_suffix }}.tar.gz
            ${{ env.BINARY_NAME }}-${{ matrix.archive_suffix }}.sha256
          generate_release_notes: true
