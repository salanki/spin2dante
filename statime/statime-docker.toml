# Statime PTP configuration for spin2dante production deployment.
#
# Runs as PTPv1 FOLLOWER using software timestamps.
# Requires an existing DANTE device on the network acting as PTP master.
# Exports synchronized clock to spin2dante bridges via usrvclock.
#
# The network interface is patched by entrypoint.sh from $PTP_INTERFACE.

loglevel = "info"

sdo-id = 0
domain = 0
priority1 = 251   # high = prefer to be PTP follower
priority2 = 128

virtual-system-clock = true
virtual-system-clock-base = "monotonic_raw"

# Export clock via usrvclock protocol
usrvclock-export = true
usrvclock-path = "/shared/usrvclock"

[[port]]
interface = "eth0"              # patched by entrypoint.sh from $PTP_INTERFACE
network-mode = "ipv4"
hardware-clock = "none"         # software timestamps only
protocol-version = "PTPv1"      # Dante native PTP
