name: "spin2dante"
version: "edge"
slug: spin2dante
description: >-
  Bridge Sendspin audio streams, such as Music Assistant playback, to DANTE.
url: "https://github.com/salanki/spin2dante"
stage: experimental
startup: application
boot: auto
init: false
host_network: true
legacy: true
arch:
  - aarch64
  - amd64
image: ghcr.io/salanki/spin2dante-addon
map:
  - type: share
    read_only: false
    path: /share
privileged:
  - IPC_LOCK
ulimits:
  memlock:
    soft: 200000000
    hard: 200000000
options:
  url: "ws://music-assistant.local:8927/sendspin"
  name: "Sendspin Bridge"
  buffer_ms: 50
  clock_path: "/share/usrvclock"
  log_level: "info"
schema:
  url: str
  name: str
  buffer_ms: int(10,5000)
  clock_path: str
  log_level: list(trace|debug|info|warn|error)
