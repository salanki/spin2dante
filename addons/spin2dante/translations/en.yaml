configuration:
  clock_path:
    name: Clock socket path
    description: Path to the usrvclock socket provided by the PTP daemon.
  wait_for_clock_seconds:
    name: Clock wait timeout
    description: How long to wait for the clock socket before startup fails.
  log_level:
    name: Log level
    description: Verbosity of add-on logs.
  drift_threshold_ms:
    name: Drift threshold
    description: Drift in milliseconds before the bridge applies an in-place anchor correction.
  drift_check_interval_ms:
    name: Drift check interval
    description: How often, in milliseconds, the bridge samples drift between the Sendspin and PTP timelines.
  max_correction_samples_per_tick:
    name: Max correction per tick
    description: Maximum anchor shift, in samples, that can be applied in one drift-correction tick.
  bridges:
    name: Bridges
    description: List of Sendspin-to-DANTE bridge definitions.
