## Real PTP test: uses Statime (actual PTP daemon) instead of fake_usrvclock_server.
##
## Statime runs as PTPv2 leader using software timestamps, providing a real
## PTP-synchronized clock to all inferno devices via the usrvclock protocol.
## This validates the bridge works correctly with proper PTP timing.

volumes:
  shared:

networks:
  audio_net:
    driver: bridge

services:
  init:
    image: alpine:3
    command: sh -c "rm -rf /shared/* && echo 'shared volume cleared'"
    volumes:
      - shared:/shared

  # Real PTP clock source using Statime
  statime:
    build:
      context: ./statime
    volumes:
      - shared:/shared
    # Statime needs a real NIC with a globally-administered MAC address
    # to derive its clock identity (bug: eager evaluation in unwrap_or).
    # Use host network so it can see the host's physical NIC.
    network_mode: host
    cap_add:
      - SYS_TIME    # Required for clock operations
      - NET_BIND_SERVICE
    depends_on:
      init:
        condition: service_completed_successfully

  # Sendspin test source
  sendspin_source:
    build:
      context: ./sendspin_source
    networks:
      - audio_net
    depends_on:
      init:
        condition: service_completed_successfully

  # The bridge under test
  bridge:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_bridge && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SSBridge --buffer-ms 50"]
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_TX_CHANNELS: "2"
      INFERNO_RX_CHANNELS: "0"
      INFERNO_SAMPLE_RATE: "48000"
      TMPDIR: /shared/tmp_bridge
      RUST_LOG: "info"
    volumes:
      - shared:/shared
    networks:
      - audio_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    depends_on:
      statime:
        condition: service_started
      sendspin_source:
        condition: service_started

  # DANTE receiver
  i2pipe:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_i2pipe && sleep 10 && inferno2pipe -c 2 -o /shared/capture.raw"]
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: i2pipe
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "2"
      INFERNO_TX_CHANNELS: "0"
      TMPDIR: /shared/tmp_i2pipe
    volumes:
      - shared:/shared
    networks:
      - audio_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    depends_on:
      statime:
        condition: service_started
      bridge:
        condition: service_started

  # Test orchestrator
  control_and_test:
    build:
      context: ./control_and_test
    volumes:
      - shared:/shared
    networks:
      - audio_net
    depends_on:
      bridge:
        condition: service_started
      i2pipe:
        condition: service_started
