## Interactive Music Assistant test — full DANTE path
##
## All DANTE containers on a bridge network (unique IPs, like real hardware).
## Bridges connect to MA via the host gateway IP (not localhost).
##
## Prerequisites:
##   - Music Assistant running on the host (make ma-up)
##   - inferno2pipe image built (make inferno2pipe)
##   - Set MA_HOST to the IP where Music Assistant is reachable
##     (default: host.docker.internal on Docker Desktop, or host gateway)
##
## Usage:
##   make test-ma-interactive
##   # Then select Bridge1/Bridge2 as players in Music Assistant
##
## Output: output/bridge1.raw, output/bridge2.raw

volumes:
  shared:

networks:
  dante_net:
    driver: bridge

services:
  # PTPv2 master — clock reference, does NOT export usrvclock
  ptp-master:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-master.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-master.toml:/etc/statime-ptpv2-master.toml:ro
    networks:
      - dante_net
    depends_on:
      init:
        condition: service_completed_successfully

  # PTPv2 follower — syncs to master, EXPORTS usrvclock for inferno
  clock:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-follower.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-follower.toml:/etc/statime-ptpv2-follower.toml:ro
    networks:
      - dante_net
    depends_on:
      ptp-master:
        condition: service_started
      init:
        condition: service_completed_successfully

  init:
    image: alpine:3
    command: sh -c "rm -rf /shared/* && echo 'shared volume cleared'"
    volumes:
      - shared:/shared

  # Bridge 1
  bridge-1:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--url", "ws://${MA_HOST:-172.17.0.1}:8927/sendspin", "--name", "Bridge1"]
    networks:
      - dante_net
    ulimits:
      memlock: 200000000
      rtprio: 99
    shm_size: 200m
    volumes:
      - shared:/shared
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_SAMPLE_RATE: "48000"
      TMPDIR: /shared/tmp_bridge1
      RUST_LOG: "info"
    depends_on:
      clock:
        condition: service_started

  # Bridge 2
  bridge-2:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--url", "ws://${MA_HOST:-172.17.0.1}:8927/sendspin", "--name", "Bridge2"]
    networks:
      - dante_net
    ulimits:
      memlock: 200000000
      rtprio: 99
    shm_size: 200m
    volumes:
      - shared:/shared
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_PROCESS_ID: "2"
      INFERNO_ALT_PORT: "14010"
      TMPDIR: /shared/tmp_bridge2
      RUST_LOG: "info"
    depends_on:
      clock:
        condition: service_started

  # DANTE receiver for Bridge 1 (unique IP on bridge network)
  i2pipe-1:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_rx1 && sleep 10 && inferno2pipe -c 2 -o /output/bridge1.raw"]
    networks:
      - dante_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    volumes:
      - shared:/shared
      - ../output:/output
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: rx1
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "2"
      INFERNO_TX_CHANNELS: "0"
      TMPDIR: /shared/tmp_rx1
    depends_on:
      bridge-1:
        condition: service_started

  # DANTE receiver for Bridge 2 (unique IP on bridge network)
  i2pipe-2:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_rx2 && sleep 10 && inferno2pipe -c 2 -o /output/bridge2.raw"]
    networks:
      - dante_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    volumes:
      - shared:/shared
      - ../output:/output
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: rx2
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "2"
      INFERNO_TX_CHANNELS: "0"
      TMPDIR: /shared/tmp_rx2
    depends_on:
      bridge-2:
        condition: service_started

  # Shared 4-channel receiver for sync verification
  # RX ch 01,02 from Bridge1; RX ch 03,04 from Bridge2
  i2pipe-sync:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_rxsync && sleep 10 && inferno2pipe -c 4 -o /output/sync.raw"]
    networks:
      - dante_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    volumes:
      - shared:/shared
      - ../output:/output
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: rxsync
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "4"
      INFERNO_TX_CHANNELS: "0"
      TMPDIR: /shared/tmp_rxsync
    depends_on:
      bridge-1:
        condition: service_started
      bridge-2:
        condition: service_started

  # Monitor: subscribes and reports capture status + sync
  monitor:
    build:
      context: ./ma_monitor
    networks:
      - dante_net
    volumes:
      - shared:/shared
      - ../output:/output
    depends_on:
      i2pipe-1:
        condition: service_started
      i2pipe-2:
        condition: service_started
      i2pipe-sync:
        condition: service_started
