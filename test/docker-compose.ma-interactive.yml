## Interactive Music Assistant test — full DANTE path
##
## Connects 2 bridges to a locally running Music Assistant, captures
## DANTE output via inferno2pipe. Runs until ctrl-c.
##
## Prerequisites:
##   - Music Assistant running on the host (make ma-up)
##   - inferno2pipe image built (make inferno2pipe)
##
## Usage:
##   make test-ma-interactive
##
## Output files:
##   output/bridge1.raw, output/bridge2.raw (32-bit signed, stereo, 48kHz)

services:
  # Fake PTP clock (sufficient for loopback testing without real DANTE hardware)
  clock:
    build:
      context: ../../inferno/test/dockerized_trx/fake_usrvclock_server
    environment:
      USRVCLOCK_SOCKET: /shared/usrvclock
    network_mode: host
    volumes:
      - /tmp/spin2dante:/shared

  # Bridge 1
  bridge-1:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--url", "ws://localhost:8927/sendspin", "--name", "Bridge1", "--buffer-ms", "50"]
    network_mode: host
    ulimits:
      memlock: 200000000
      rtprio: 99
    volumes:
      - /tmp/spin2dante:/shared
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_PROCESS_ID: "1"
      INFERNO_ALT_PORT: "14000"
      TMPDIR: /shared/tmp_bridge1
      RUST_LOG: "info"
    depends_on:
      clock:
        condition: service_started

  # Bridge 2
  bridge-2:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["--url", "ws://localhost:8927/sendspin", "--name", "Bridge2", "--buffer-ms", "50"]
    network_mode: host
    ulimits:
      memlock: 200000000
      rtprio: 99
    volumes:
      - /tmp/spin2dante:/shared
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_PROCESS_ID: "2"
      INFERNO_ALT_PORT: "14010"
      TMPDIR: /shared/tmp_bridge2
      RUST_LOG: "info"
    depends_on:
      clock:
        condition: service_started

  # DANTE receiver capturing Bridge 1
  i2pipe-1:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_rx1 && sleep 10 && inferno2pipe -c 2 -o /output/bridge1.raw"]
    network_mode: host
    ulimits:
      memlock: 200000000
    volumes:
      - /tmp/spin2dante:/shared
      - ../output:/output
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: rx1
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "2"
      INFERNO_TX_CHANNELS: "0"
      INFERNO_PROCESS_ID: "101"
      INFERNO_ALT_PORT: "15000"
      TMPDIR: /shared/tmp_rx1
    depends_on:
      bridge-1:
        condition: service_started

  # DANTE receiver capturing Bridge 2
  i2pipe-2:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_rx2 && sleep 10 && inferno2pipe -c 2 -o /output/bridge2.raw"]
    network_mode: host
    ulimits:
      memlock: 200000000
    volumes:
      - /tmp/spin2dante:/shared
      - ../output:/output
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: rx2
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "2"
      INFERNO_TX_CHANNELS: "0"
      INFERNO_PROCESS_ID: "102"
      INFERNO_ALT_PORT: "15010"
      TMPDIR: /shared/tmp_rx2
    depends_on:
      bridge-2:
        condition: service_started

  # Monitor: creates DANTE subscriptions then watches health
  monitor:
    build:
      context: ./ma_monitor
    network_mode: host
    volumes:
      - /tmp/spin2dante:/shared
      - ../output:/output
    depends_on:
      bridge-1:
        condition: service_started
      bridge-2:
        condition: service_started
      i2pipe-1:
        condition: service_started
      i2pipe-2:
        condition: service_started
