      dockerfile: ./control_and_test_multi/Dockerfile
    volumes:
      - shared:/shared
    networks:
      - audio_net
    depends_on:
      bridge-01: { condition: service_started }
      bridge-02: { condition: service_started }
      bridge-03: { condition: service_started }
      bridge-04: { condition: service_started }
      bridge-05: { condition: service_started }
      bridge-06: { condition: service_started }
      bridge-07: { condition: service_started }
      bridge-08: { condition: service_started }
      bridge-09: { condition: service_started }
