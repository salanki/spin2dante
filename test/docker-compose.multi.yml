  i2pipe-05: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r05 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_05.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r05, INFERNO_NAME: rx05, INFERNO_DEVICE_ID: "0000000000000205" }, depends_on: { ptp-follower: { condition: service_started }, bridge-05: { condition: service_started } } }
  i2pipe-06: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r06 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_06.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r06, INFERNO_NAME: rx06, INFERNO_DEVICE_ID: "0000000000000206" }, depends_on: { ptp-follower: { condition: service_started }, bridge-06: { condition: service_started } } }
