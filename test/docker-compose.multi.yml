## Multi-stream E2E test: 16 synchronized Sendspin players → 16 DANTE transmitters
##
## All 16 bridges connect to the same Sendspin server (one group).
## Each bridge becomes a separate DANTE TX device.
## Each i2pipe captures one bridge's output.
## The control container creates all subscriptions (in parallel) and validates.

volumes:
  shared:

networks:
  audio_net:
    driver: bridge

x-bridge-common: &bridge-common
  build:
    context: ..
    dockerfile: Dockerfile
  entrypoint: ["/bin/sh", "-c"]
  volumes:
    - shared:/shared
  networks:
    - audio_net
  ulimits:
    memlock: 200000000
  shm_size: 200m
  depends_on:
    ptp-follower:
      condition: service_started
    sendspin_source:
      condition: service_started

x-i2pipe-common: &i2pipe-common
  image: inferno_aoip:alpine-i2pipe
  entrypoint: ["/bin/sh", "-c"]
  volumes:
    - shared:/shared
  networks:
    - audio_net
  ulimits:
    memlock: 200000000
  shm_size: 200m
  depends_on:
    ptp-follower:
      condition: service_started

x-bridge-env: &bridge-env
  INFERNO_CLOCK_PATH: /shared/usrvclock
  INFERNO_TX_CHANNELS: "2"
  INFERNO_RX_CHANNELS: "0"
  INFERNO_SAMPLE_RATE: "48000"
  RUST_LOG: "info"

x-i2pipe-env: &i2pipe-env
  INFERNO_CLOCK_PATH: /shared/usrvclock
  INFERNO_SAMPLE_RATE: "48000"
  INFERNO_RX_CHANNELS: "2"
  INFERNO_TX_CHANNELS: "0"

services:
  init:
    image: alpine:3
    command: sh -c "rm -rf /shared/* && echo 'shared volume cleared'"
    volumes:
      - shared:/shared

  ptp-master:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-master.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-master.toml:/etc/statime-ptpv2-master.toml:ro
    networks:
      - audio_net
    depends_on:
      init:
        condition: service_completed_successfully

  ptp-follower:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-follower.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-follower.toml:/etc/statime-ptpv2-follower.toml:ro
    networks:
      - audio_net
    depends_on:
      ptp-master:
        condition: service_started

  sendspin_source:
    build:
      context: .
      dockerfile: ./sendspin_source/Dockerfile
    volumes:
      - shared:/shared
    networks:
      - audio_net
    depends_on:
      init:
        condition: service_completed_successfully

  # --- 16 bridge instances ---
  bridge-01: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b01 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS01 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b01, INFERNO_DEVICE_ID: "0000000000000101" } }
  bridge-02: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b02 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS02 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b02, INFERNO_DEVICE_ID: "0000000000000102" } }
  bridge-03: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b03 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS03 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b03, INFERNO_DEVICE_ID: "0000000000000103" } }
  bridge-04: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b04 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS04 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b04, INFERNO_DEVICE_ID: "0000000000000104" } }
  bridge-05: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b05 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS05 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b05, INFERNO_DEVICE_ID: "0000000000000105" } }
  bridge-06: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b06 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS06 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b06, INFERNO_DEVICE_ID: "0000000000000106" } }
  bridge-07: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b07 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS07 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b07, INFERNO_DEVICE_ID: "0000000000000107" } }
  bridge-08: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b08 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS08 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b08, INFERNO_DEVICE_ID: "0000000000000108" } }
  bridge-09: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b09 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS09 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b09, INFERNO_DEVICE_ID: "0000000000000109" } }
  bridge-10: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b10 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS10 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b10, INFERNO_DEVICE_ID: "000000000000010a" } }
  bridge-11: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b11 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS11 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b11, INFERNO_DEVICE_ID: "000000000000010b" } }
  bridge-12: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b12 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS12 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b12, INFERNO_DEVICE_ID: "000000000000010c" } }
  bridge-13: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b13 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS13 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b13, INFERNO_DEVICE_ID: "000000000000010d" } }
  bridge-14: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b14 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS14 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b14, INFERNO_DEVICE_ID: "000000000000010e" } }
  bridge-15: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b15 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS15 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b15, INFERNO_DEVICE_ID: "000000000000010f" } }
  bridge-16: { <<: *bridge-common, command: ["mkdir -p /shared/tmp_b16 && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SS16 --buffer-ms 50"], environment: { <<: *bridge-env, TMPDIR: /shared/tmp_b16, INFERNO_DEVICE_ID: "0000000000000110" } }

  # --- 16 i2pipe receivers ---
  i2pipe-01: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r01 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_01.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r01, INFERNO_NAME: rx01, INFERNO_DEVICE_ID: "0000000000000201" }, depends_on: { ptp-follower: { condition: service_started }, bridge-01: { condition: service_started } } }
  i2pipe-02: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r02 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_02.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r02, INFERNO_NAME: rx02, INFERNO_DEVICE_ID: "0000000000000202" }, depends_on: { ptp-follower: { condition: service_started }, bridge-02: { condition: service_started } } }
