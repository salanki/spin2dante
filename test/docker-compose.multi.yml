  i2pipe-10: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r10 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_10.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r10, INFERNO_NAME: rx10, INFERNO_DEVICE_ID: "000000000000020a" }, depends_on: { ptp-follower: { condition: service_started }, bridge-10: { condition: service_started } } }
  i2pipe-11: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r11 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_11.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r11, INFERNO_NAME: rx11, INFERNO_DEVICE_ID: "000000000000020b" }, depends_on: { ptp-follower: { condition: service_started }, bridge-11: { condition: service_started } } }
  i2pipe-12: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r12 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_12.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r12, INFERNO_NAME: rx12, INFERNO_DEVICE_ID: "000000000000020c" }, depends_on: { ptp-follower: { condition: service_started }, bridge-12: { condition: service_started } } }
  i2pipe-13: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r13 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_13.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r13, INFERNO_NAME: rx13, INFERNO_DEVICE_ID: "000000000000020d" }, depends_on: { ptp-follower: { condition: service_started }, bridge-13: { condition: service_started } } }
  i2pipe-14: { <<: *i2pipe-common, command: ["mkdir -p /shared/tmp_r14 && sleep 5 && inferno2pipe -c 2 -o /shared/capture_14.raw"], environment: { <<: *i2pipe-env, TMPDIR: /shared/tmp_r14, INFERNO_NAME: rx14, INFERNO_DEVICE_ID: "000000000000020e" }, depends_on: { ptp-follower: { condition: service_started }, bridge-14: { condition: service_started } } }
