## Single-stream E2E test with real PTPv2 clock

volumes:
  shared:

networks:
  audio_net:
    driver: bridge

services:
  init:
    image: alpine:3
    command: sh -c "rm -rf /shared/* && echo 'shared volume cleared'"
    volumes:
      - shared:/shared

  # PTPv2 master — clock reference
  ptp-master:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-master.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-master.toml:/etc/statime-ptpv2-master.toml:ro
    networks:
      - audio_net
    depends_on:
      init:
        condition: service_completed_successfully

  # PTPv2 follower — syncs to master, exports usrvclock
  ptp-follower:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-follower.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-follower.toml:/etc/statime-ptpv2-follower.toml:ro
    networks:
      - audio_net
    depends_on:
      ptp-master:
        condition: service_started

  # Sendspin test source
  sendspin_source:
    build:
      context: .
      dockerfile: ./sendspin_source/Dockerfile
    volumes:
      - shared:/shared
    networks:
      - audio_net
    depends_on:
      init:
        condition: service_completed_successfully

  # Bridge under test
  bridge:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_bridge && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SSBridge"]
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      TMPDIR: /shared/tmp_bridge
      RUST_LOG: "info"
    volumes:
      - shared:/shared
    networks:
      - audio_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    depends_on:
      ptp-follower:
        condition: service_started
      sendspin_source:
        condition: service_started

  # DANTE receiver
  i2pipe:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_i2pipe && sleep 15 && inferno2pipe -c 2 -o /shared/capture.raw"]
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: i2pipe
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "2"
      INFERNO_TX_CHANNELS: "0"
      TMPDIR: /shared/tmp_i2pipe
    volumes:
      - shared:/shared
    networks:
      - audio_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    depends_on:
      ptp-follower:
        condition: service_started
      bridge:
        condition: service_started

  # Test orchestrator
  control_and_test:
    build:
      context: .
      dockerfile: ./control_and_test/Dockerfile
    volumes:
      - shared:/shared
    networks:
      - audio_net
    depends_on:
      bridge:
        condition: service_started
      i2pipe:
        condition: service_started
