## PTPv2 clock test: Statime master + follower, single bridge + i2pipe
## Tests whether real PTP sync traffic makes the clock overlay work.

volumes:
  shared:

networks:
  audio_net:
    driver: bridge

services:
  init:
    image: alpine:3
    command: sh -c "rm -rf /shared/* && echo 'shared volume cleared'"
    volumes:
      - shared:/shared

  # PTPv2 master — clock reference, does NOT export usrvclock
  ptp-master:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-master.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-master.toml:/etc/statime-ptpv2-master.toml:ro
    networks:
      - audio_net
    depends_on:
      init:
        condition: service_completed_successfully

  # PTPv2 follower — creates sync traffic so master exports overlays
  ptp-follower:
    build:
      context: ../statime
    cap_add:
      - SYS_TIME
    environment:
      STATIME_CONFIG: /etc/statime-ptpv2-follower.toml
    volumes:
      - shared:/shared
      - ../statime/statime-ptpv2-follower.toml:/etc/statime-ptpv2-follower.toml:ro
    networks:
      - audio_net
    depends_on:
      ptp-master:
        condition: service_started

  # Sendspin test source
  sendspin_source:
    build:
      context: ./sendspin_source
    networks:
      - audio_net
    depends_on:
      init:
        condition: service_completed_successfully

  # Bridge
  bridge:
    build:
      context: ..
      dockerfile: Dockerfile
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_bridge && exec spin2dante --url ws://sendspin_source:8927/sendspin --name SSBridge --buffer-ms 50"]
    networks:
      - audio_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    volumes:
      - shared:/shared
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_SAMPLE_RATE: "48000"
      TMPDIR: /shared/tmp_bridge
      RUST_LOG: "info"
    depends_on:
      ptp-follower:
        condition: service_started
      sendspin_source:
        condition: service_started

  # DANTE receiver
  i2pipe:
    image: inferno_aoip:alpine-i2pipe
    entrypoint: ["/bin/sh", "-c"]
    command: ["mkdir -p /shared/tmp_rx && sleep 15 && inferno2pipe -c 2 -o /shared/capture.raw"]
    networks:
      - audio_net
    ulimits:
      memlock: 200000000
    shm_size: 200m
    volumes:
      - shared:/shared
    environment:
      INFERNO_CLOCK_PATH: /shared/usrvclock
      INFERNO_NAME: i2pipe
      INFERNO_SAMPLE_RATE: "48000"
      INFERNO_RX_CHANNELS: "2"
      INFERNO_TX_CHANNELS: "0"
      TMPDIR: /shared/tmp_rx
    depends_on:
      bridge:
        condition: service_started

  # Test orchestrator
  control_and_test:
    build:
      context: ./control_and_test
    volumes:
      - shared:/shared
    networks:
      - audio_net
    depends_on:
      bridge:
        condition: service_started
      i2pipe:
        condition: service_started
